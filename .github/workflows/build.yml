name: Build Binaries (Reusable)

on:
  workflow_call:
    inputs:
      version_name:
        description: 'Version identifier (e.g., v1.0.0 or nightly-abc1234)'
        required: true
        type: string
      is_nightly:
        description: 'Whether this is a nightly build'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build querymt-tui for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ─── Linux (Static MUSL) ──────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin_name: querymt-tui
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            bin_name: querymt-tui
            archive_ext: tar.gz

          # ─── macOS ────────────────────────────────────────────────────────
          - os: macos-14
            target: x86_64-apple-darwin
            bin_name: querymt-tui
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            bin_name: querymt-tui
            archive_ext: tar.gz

          # TODO: add Windows targets (x86_64-pc-windows-msvc, aarch64-pc-windows-msvc)
          # TODO: add FreeBSD target (x86_64-unknown-freebsd)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain & targets
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        if: runner.os == 'Linux'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          QUERYMT_TUI_VERSION: ${{ inputs.version_name }}
        run: cargo build --release --bin querymt-tui --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          ARTIFACT_DIR="dist"
          PKG="querymt-tui-${{ inputs.version_name }}-${{ matrix.target }}"
          STAGING="$ARTIFACT_DIR/$PKG"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$STAGING/"
          cp README.md LICENSE "$STAGING/"
          tar -czf "$ARTIFACT_DIR/${PKG}.tar.gz" -C "$ARTIFACT_DIR" "$PKG"
          echo "ASSET_PATH=$ARTIFACT_DIR/${PKG}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: querymt-tui-${{ matrix.target }}
          path: ${{ env.ASSET_PATH }}
